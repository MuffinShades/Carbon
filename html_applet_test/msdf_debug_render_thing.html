            const can = document.getElementById('c');
            const ctx = can.getContext('2d');

            const scale = 10;

            var xMax = -Infinity, yMax = -Infinity, xMin = Infinity, yMin = Infinity;

            for (var c = 0; c < points.length; c++) {
                const cont = points[c];

                for (var i = 0; i < cont.length; i++) {
                    var p = cont[i];

                    if (p[0] > xMax)
                        xMax = p[0];

                    if (p[0] < xMin)
                        xMin = p[0];

                    if (p[1] > yMax)
                        yMax = p[1];

                    if (p[1] < yMin)
                        yMin = p[1];
                }
            }

            xMax *= scale;
            yMax *= scale;
            xMin *= scale;
            yMin *= scale;

            can.width = xMax - xMin + 10;
            can.height = yMax - yMin + 10;

            var chroma = ['#f00', '#0f0', '#00f'];

            for (var c = 0; c < points.length; c++) {
                const cont = points[c];
                ctx.strokeStyle = chroma[c % chroma.length];
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(cont[0][0] * scale - xMin, can.height - cont[0][1] * scale + yMin);

                for (var i = 1; i < cont.length; i++) {
                    var p = cont[i];

                    ctx.lineTo(p[0] * scale - xMin, can.height - p[1] * scale + yMin);

                    if (p[3]) {
                        ctx.strokeStyle = p[3];
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(p[0] * scale - xMin, can.height - p[1] * scale + yMin);
                    }
                }

                ctx.stroke();
            }
